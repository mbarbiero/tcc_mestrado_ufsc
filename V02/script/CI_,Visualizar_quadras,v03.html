<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Captura 800x600 - v07 Dinâmica</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { margin: 0; padding: 0; width: 800px; height: 600px; overflow: hidden; background: #000; font-family: sans-serif; }
        #map { width: 800px; height: 600px; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 800px; height: 600px;
            z-index: 2000; background: rgba(255, 255, 255, 0.98);
            display: flex; align-items: center; justify-content: center;
        }
        .panel { text-align: center; padding: 20px; border: 1px solid #ddd; background: white; }
        .hidden { display: none !important; }

        /* Legenda Minimalista Dinâmica */
        #legend {
            position: absolute; 
            top: 10px; 
            left: 10px;
            z-index: 1500; 
            background: rgba(255, 255, 255, 0.85);
            padding: 6px 10px; 
            border-radius: 3px; 
            font-size: 10px; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.2); 
            pointer-events: none;
            border: 1px solid #ccc;
            display: none; /* Escondida até carregar dados */
        }
        .leg-item { display: flex; align-items: center; margin-bottom: 2px; color: #444; white-space: nowrap; }
        .leg-item:last-child { margin-bottom: 0; }
        .dot { width: 8px; height: 8px; border-radius: 1px; margin-right: 6px; }
    </style>
</head>
<body oncontextmenu="toggleUI(event)">

    <div id="ui-layer">
        <div class="panel">
            <h3>Captura v07</h3>
            <p style="font-size: 12px;">Legenda dinâmica baseada no CSV:</p>
            <input type="file" id="csvFile" accept=".csv">
            <br><br>
            <button style="padding: 6px 12px; cursor:pointer;" onclick="document.getElementById('ui-layer').classList.add('hidden')">Ver Mapa</button>
        </div>
    </div>

    <div id="legend"></div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wicket/1.3.8/wicket.min.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-25.67, -53.81], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const geoLayer = L.featureGroup().addTo(map);

        // Mapeamento de rótulos e cores
        const colorConfig = {
            'red':   { hex: '#e74c3c', label: 'Não reconhecida' },
            'green': { hex: '#2ecc71', label: 'Reconhecida' },
            'blue':  { hex: '#3498db', label: 'Correspondente' }
        };

        function toggleUI(e) { e.preventDefault(); document.getElementById('ui-layer').classList.toggle('hidden'); }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const lines = event.target.result.split(/\r?\n/);
                const firstLine = lines[0];
                const headers = firstLine.split(',').map(h => h.replace(/["'\]\[\s]/g, '').toLowerCase());
                
                const geoIdx = headers.findIndex(h => h.includes('geometria'));
                const corIdx = headers.findIndex(h => h.includes('status_cor'));

                geoLayer.clearLayers();
                
                // Set para armazenar cores únicas encontradas no arquivo
                const detectedColors = new Set();

                lines.slice(1).forEach((line) => {
                    if (!line.trim()) return;
                    const cols = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    
                    if (cols && cols[geoIdx]) {
                        try {
                            const wkt = new Wkt.Wkt();
                            wkt.read(cols[geoIdx].replace(/^"|"$/g, '').trim());
                            
                            let rawCor = cols[corIdx] || cols[cols.length - 1];
                            rawCor = rawCor.replace(/["'\]\[\s]/g, '').toLowerCase();
                            
                            // Registra a cor detectada
                            if (colorConfig[rawCor]) {
                                detectedColors.add(rawCor);
                            } else {
                                detectedColors.add('red'); // Fallback
                                rawCor = 'red';
                            }

                            const hex = colorConfig[rawCor].hex;

                            L.geoJSON(wkt.toJson(), {
                                style: { color: hex, weight: 1.2, fillColor: hex, fillOpacity: 0.15 }
                            }).addTo(geoLayer);
                        } catch (err) {}
                    }
                });

                // Atualiza a legenda dinamicamente
                updateLegend(detectedColors);

                if (geoLayer.getLayers().length > 0) {
                    map.fitBounds(geoLayer.getBounds());
                    document.getElementById('ui-layer').classList.add('hidden');
                }
            };
            reader.readAsText(file);
        });

        function updateLegend(colorsSet) {
            const legendDiv = document.getElementById('legend');
            legendDiv.innerHTML = ''; // Limpa atual
            
            if (colorsSet.size === 0) {
                legendDiv.style.display = 'none';
                return;
            }

            // Garante uma ordem lógica: Blue -> Green -> Red
            const order = ['blue', 'green', 'red'];
            
            order.forEach(colorKey => {
                if (colorsSet.has(colorKey)) {
                    const item = document.createElement('div');
                    item.className = 'leg-item';
                    item.innerHTML = `
                        <div class="dot" style="background:${colorConfig[colorKey].hex}"></div>
                        ${colorConfig[colorKey].label}
                    `;
                    legendDiv.appendChild(item);
                }
            });

            legendDiv.style.display = 'block';
        }
    </script>
</body>
</html>
