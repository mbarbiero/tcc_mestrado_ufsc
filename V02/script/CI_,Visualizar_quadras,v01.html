<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Captura de Geometria - 800x600</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Força a janela a ter 800x600 sem margens ou barras */
        html, body { 
            margin: 0; padding: 0; 
            width: 800px; height: 600px; 
            overflow: hidden; background: #000;
        }
        
        #map { 
            width: 800px; height: 600px; 
            z-index: 1; 
        }

        /* Interface que desaparece */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 800px; height: 600px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #ffffff; /* Guia branca nos limites */
            box-sizing: border-box;
        }

        .panel {
            text-align: center;
            padding: 30px;
            background: white;
            border: 2px solid #ff7800;
            border-radius: 0; /* Ângulos retos */
        }

        .hidden { display: none !important; }

        h2 { margin-top: 0; color: #333; font-family: sans-serif; }
    </style>
</head>
<body oncontextmenu="showUI(event)">

    <div id="ui-layer">
        <div class="panel">
            <h2>Captura de Quadras (800x600)</h2>
            <p>1. Selecione o arquivo CSV para processar.</p>
            <input type="file" id="csvFile" accept=".csv">
            <p style="font-size: 12px; color: #666; margin-top: 20px;">
                * A tela ficará limpa após a carga.<br>
                * Clique com o <b>botão direito</b> para voltar aqui.
            </p>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wicket/1.3.8/wicket.min.js"></script>

    <script>
        // Configuração do mapa focada em Capanema
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView([-25.67, -53.81], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const geoGroup = L.featureGroup().addTo(map);

        const uiLayer = document.getElementById('ui-layer');

        function showUI(e) {
            e.preventDefault(); // Impede o menu padrão do Windows
            uiLayer.classList.remove('hidden');
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const rows = event.target.result.split(/\r?\n/);
                const headers = rows[0].split(',');
                const gIdx = headers.findIndex(h => h.includes('geometria'));

                geoGroup.clearLayers();

                rows.slice(1).forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (cols && cols[gIdx]) {
                        try {
                            const wkt = new Wkt.Wkt();
                            wkt.read(cols[gIdx].replace(/^"|"$/g, '').trim());
                            L.geoJSON(wkt.toJson(), {
                                style: { 
                                    color: '#e67e22', 
                                    weight: 3, 
                                    fillColor: '#ffbb33', 
                                    fillOpacity: 0.7 
                                }
                            }).addTo(geoGroup);
                        } catch (err) {}
                    }
                });

                if (geoGroup.getLayers().length > 0) {
                    map.fitBounds(geoGroup.getBounds());
                    // OCULTAR INTERFACE APÓS CARGA
                    uiLayer.classList.add('hidden');
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
