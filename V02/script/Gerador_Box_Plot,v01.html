<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Análise de Extremos - SuperCIATA v02</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f8fafc; padding: 20px; }
        .container { width: 800px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h2 { color: #1e293b; margin-top: 0; border-bottom: 3px solid #3b82f6; padding-bottom: 12px; }
        .controls { margin-bottom: 20px; padding: 15px; background: #f1f5f9; border-radius: 8px; }
        #plot-area { width: 750px; height: 500px; }
        .footer-info { font-size: 11px; color: #64748b; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Análise de Acurácia: Contraste de Extremos</h2>
    
    <div class="controls">
        <label style="font-weight: 600;">Carregar Memória de Cálculo (.csv): </label>
        <input type="file" id="csv-file" accept=".csv">
    </div>

    <div id="plot-area"></div>
    
    <div class="footer-info">
        <b>Correção de Erro:</b> Filtro de dados nulos e normalização de colunas aplicado.
    </div>
</div>

<script>
    document.getElementById('csv-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        Papa.parse(file, {
            header: true,
            delimiter: ";",
            dynamicTyping: true,
            skipEmptyLines: true,
            transformHeader: h => h.trim(), // Remove espaços extras dos nomes das colunas
            complete: function(results) {
                processData(results.data);
            }
        });
    });

    function processData(data) {
        let maxVal = -Infinity;
        let minVal = Infinity;
        let maxQuadra = "N/A";
        let minQuadra = "N/A";
        
        const distancias = [];

        data.forEach(row => {
            let val = row.DISTANCIA_METROS;
            
            // Tratamento de conversão (ponto/vírgula)
            if(typeof val === 'string') val = parseFloat(val.replace(',', '.'));
            
            // Só processa se for um número válido
            if (val !== null && !isNaN(val)) {
                distancias.push(val);
                if (val > maxVal) { maxVal = val; maxQuadra = row.ID_QUADRA || "S/ID"; }
                if (val < minVal) { minVal = val; minQuadra = row.ID_QUADRA || "S/ID"; }
            }
        });

        // Verifica se há dados antes de plotar
        if (distancias.length === 0) {
            alert("Nenhum dado válido encontrado na coluna 'DISTANCIA_METROS'. Verifique o cabeçalho do arquivo.");
            return;
        }

        const trace = {
            y: distancias,
            type: 'box',
            name: 'Vértices',
            marker: { color: '#3b82f6', size: 7 },
            boxpoints: 'outliers',
            fillcolor: 'rgba(59, 130, 246, 0.3)',
            line: { width: 2 }
        };

        const layout = {
            width: 750,
            height: 500,
            yaxis: { title: 'Erro Posicional (Metros)', gridcolor: '#f1f5f9' },
            xaxis: { showticklabels: false },
            margin: { l: 60, r: 180, t: 40, b: 40 },
            annotations: [
                {
                    x: 0, y: maxVal, xref: 'x', yref: 'y',
                    text: `<b>VALOR MÁXIMO (Outlier)</b><br>ID: ${maxQuadra}<br>Erro: ${maxVal.toFixed(3)}m`,
                    showarrow: true, arrowhead: 2, ax: 110, ay: -40,
                    bgcolor: '#fef2f2', bordercolor: '#ef4444', borderwidth: 2, font: { color: '#b91c1c' }
                },
                {
                    x: 0, y: minVal, xref: 'x', yref: 'y',
                    text: `<b>VALOR MÍNIMO (Precisão)</b><br>ID: ${minQuadra}<br>Erro: ${minVal.toFixed(3)}m`,
                    showarrow: true, arrowhead: 2, ax: 110, ay: 40,
                    bgcolor: '#f0fdf4', bordercolor: '#22c55e', borderwidth: 2, font: { color: '#15803d' }
                }
            ]
        };

        Plotly.newPlot('plot-area', [trace], layout);
    }
</script>

</body>
</html>
