<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SuperCIATA v11.6 - Visualizador de Logradouros</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; }
        #header { width: 950px; background: #2c3e50; padding: 15px; border-radius: 8px; margin-top: 10px; text-align: center; border-bottom: 4px solid #f1c40f; }
        #dashboard { width: 980px; display: grid; grid-template-columns: 380px 1fr; gap: 10px; margin-top: 15px; }
        #side-panel { background: #fff; color: #333; padding: 0; border-radius: 8px; height: 750px; display: flex; flex-direction: column; overflow: hidden; }
        #map { height: 750px; border-radius: 8px; background: #222; border: 2px solid #f1c40f; }
        #list-container { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .log-section { margin-bottom: 12px; border: 1px solid #eee; border-radius: 5px; overflow: hidden; }
        .log-header { background: #fcf8e3; padding: 8px; font-weight: bold; font-size: 11px; color: #8a6d3b; border-bottom: 1px solid #faebcc; }
        .segment-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 10px; transition: 0.2s; }
        .segment-item:hover { background: #fcf8e3; }
        .segment-item.active { background: #fdfae3; border-left: 5px solid #f1c40f; font-weight: bold; }
        .segment-item.added { background: #dff0d8 !important; border-right: 10px solid #3c763d; }
        .badge { background: #34495e; color: white; width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 9px; flex-shrink: 0; }
        #export-controls { background: #f9f9f9; padding: 15px; border-top: 2px solid #f1c40f; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 8px; font-size: 13px; }
        .btn-add { background: #f1c40f; color: #000; }
        .btn-save { background: #27ae60; color: white; }
        .status-txt { text-align: center; font-size: 12px; margin-bottom: 10px; color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <div id="header">
        <h2 style="margin:0; color: #f1c40f;">SuperCIATA v11.6</h2>
        <p style="font-size: 12px; margin: 5px 0; color: #bdc3c7;">Banco de Dados Completo: Seleção Visual Ativa</p>
    </div>

    <div id="dashboard">
        <div id="side-panel">
            <div id="list-container"></div>
            <div id="export-controls">
                <div class="status-txt" id="status">Selecione um logradouro no mapa ou na lista</div>
                <button class="btn-main btn-add" onclick="confirmarAdicao()">+ ADICIONAR SELECIONADO</button>
                <button class="btn-main btn-save" onclick="gerarArquivo()">BAIXAR CSV COM SELECIONADOS</button>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

            ["0E9A43FC","LINESTRING(-53.8127413 -25.6656207,-53.8123585 -25.664381,-53.8119854 -25.6631729,-53.8116034 -25.6619364,-53.8111815 -25.6605698,-53.8107533 -25.6591833,-53.8103197 -25.6577791,-53.8098874 -25.6563791,-53.8096344 -25.6555598,-53.8095742 -25.6553649,-53.8094701 -25.6550279,-53.8090416 -25.6536401)"]
        ];

        let map = L.map('map').setView([-25.6805, -53.8017], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let visualLayer = L.featureGroup().addTo(map); // Layer para todos os logradouros
        let focusLayer = L.featureGroup().addTo(map);  // Layer para o logradouro focado (selecionado)
        let cesta = [];
        let itemTemporario = null;
        let polyMap = {}; // Mapeia índice global para o objeto Leaflet

        function renderizar() {
            const list = document.getElementById('list-container');
            const agrupado = {};
            
            DATA.forEach((d, i) => {
                if(!agrupado[d[0]]) agrupado[d[0]] = [];
                agrupado[d[0]].push({wkt: d[1], idOriginal: i});

                // Plota todos os LineStrings no mapa inicialmente
                const coords = parseWKT(d[1]);
                const poly = L.polyline(coords, { 
                    color: '#3498db', 
                    weight: 3, 
                    opacity: 0.7 
                }).addTo(visualLayer);
                
                poly.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    selecionar(d[0], d[1], i);
                });

                polyMap[i] = poly;
            });

            for (const idLogradouro in agrupado) {
                const section = document.createElement('div');
                section.className = 'log-section';
                section.innerHTML = `<div class="log-header">LOGRADOURO: ${idLogradouro}</div>`;
                
                agrupado[idLogradouro].forEach((seg, idxRelativo) => {
                    const item = document.createElement('div');
                    item.className = 'segment-item';
                    item.id = `item-${seg.idOriginal}`;
                    item.onclick = () => selecionar(idLogradouro, seg.wkt, seg.idOriginal);
                    item.innerHTML = `<div class="badge">${idxRelativo+1}</div><span>${seg.wkt.substring(0,45)}...</span>`;
                    section.appendChild(item);
                });
                list.appendChild(section);
            }
        }

        function parseWKT(wkt) {
            return wkt.replace("LINESTRING(", "").replace(")", "").split(",").map(p => {
                const pair = p.trim().split(" ");
                return [parseFloat(pair[1]), parseFloat(pair[0])];
            });
        }

        function selecionar(id, wkt, globalIdx) {
            // UI Sidebar
            document.querySelectorAll('.segment-item').forEach(el => el.classList.remove('active'));
            const listItem = document.getElementById(`item-${globalIdx}`);
            if(listItem) {
                listItem.classList.add('active');
                listItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            itemTemporario = { id: id, wkt: wkt, idx: globalIdx };
            document.getElementById('status').innerText = `Focado: ${id}`;

            // Reset visual das linhas no visualLayer
            for (let idx in polyMap) {
                polyMap[idx].setStyle({ color: '#3498db', weight: 3, opacity: 0.7 });
            }

            // Destaca a linha selecionada no visualLayer
            if(polyMap[globalIdx]) {
                polyMap[globalIdx].setStyle({ color: '#f1c40f', weight: 8, opacity: 1 });
                polyMap[globalIdx].bringToFront();
            }

            // Desenha pontos vermelhos no focusLayer
            focusLayer.clearLayers();
            const coords = parseWKT(wkt);
            coords.forEach((c, i) => {
                L.circleMarker(c, {
                    radius: 5, 
                    color: 'white', 
                    weight: 1, 
                    fillColor: 'red', 
                    fillOpacity: 1 
                }).addTo(focusLayer).bindTooltip(`Vértice ${i+1}`);
            });

            map.fitBounds(polyMap[globalIdx].getBounds(), { padding: [100, 100] });
        }

        function confirmarAdicao() {
            if(!itemTemporario) return alert("Selecione um logradouro primeiro!");
            
            const jaAdicionado = cesta.some(item => item.idx === itemTemporario.idx);
            if(jaAdicionado) return alert("Este segmento já está na cesta!");

            cesta.push({...itemTemporario});
            document.getElementById(`item-${itemTemporario.idx}`).classList.add('added');
            document.getElementById('status').innerText = `Cesta: ${cesta.length} segmentos`;
        }

        function gerarArquivo() {
            if(cesta.length === 0) return alert("Cesta vazia!");
            
            let csv = "SC_ID_LOGRADOURO,GEOMETRIA\n";
            cesta.forEach(c => {
                csv += `${c.id},"${c.wkt}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "exportacao_curada.csv";
            link.click();
        }

        renderizar();
    </script>
</body>
</html>
