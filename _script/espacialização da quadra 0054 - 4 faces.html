<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SuperCIATA - Quadra 0054 Final</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; background: #fff; }
        .label-lote { font-size: 8px; font-weight: bold; color: #000; pointer-events: none; }
    </style>
</head>
<body>
<div id="map"></div>

<script>
    const map = L.map('map').setView([-27.595, -48.545], 19);
    const mToDeg = 0.000009; 

    const dadosLotes = [
        // FACE NORTE
        {"LOG": "AV. PARANA", "NUM": 665, "T": 19.96, "P": 22.56, "ADJ": "AV. UBIRAJARAS"},
        {"LOG": "AV. PARANA", "NUM": 655, "T": 19.96, "P": 45.12},
        {"LOG": "AV. PARANA", "NUM": 625, "T": 19.96, "P": 45.12},
        {"LOG": "AV. PARANA", "NUM": 615, "T": 9.98, "P": 45.12},
        {"LOG": "AV. PARANA", "NUM": 603, "T": 9.98, "P": 45.12},
        {"LOG": "AV. PARANA", "NUM": 589, "T": 19.96, "P": 30.08, "ADJ": "RUA CARAMURUS"},
        
        // FACE LESTE[cite: 1]
        {"LOG": "RUA CARAMURUS", "NUM": 461, "T": 15.04, "P": 19.96},
        {"LOG": "RUA CARAMURUS", "NUM": 447, "T": 20.06, "P": 49.9},
        {"LOG": "RUA CARAMURUS", "NUM": 427, "T": 11.28, "P": 19.96},
        {"LOG": "RUA CARAMURUS", "NUM": 415, "T": 11.28, "P": 19.96},

        // FACE SUL
        {"LOG": "RUA SANTA CATARINA", "NUM": 3590, "T": 19.96, "P": 22.56, "ADJ": "RUA CARAMURUS"},
        {"LOG": "RUA SANTA CATARINA", "NUM": 3612, "T": 19.96, "P": 45.12},
        {"LOG": "RUA SANTA CATARINA", "NUM": 3632, "T": 19.96, "P": 45.12},
        {"LOG": "RUA SANTA CATARINA", "NUM": 3646, "T": 9.98, "P": 36.79},
        {"LOG": "RUA SANTA CATARINA", "NUM": 3650, "T": 9.98, "P": 45.12},

        // FACE OESTE (Dados Atualizados)[cite: 1]
        {"LOG": "AV. UBIRAJARAS", "NUM": 380, "T": 45.12, "P": 19.96, "ADJ": "RUA SANTA CATARINA"},
        {"LOG": "AV. UBIRAJARAS", "NUM": 412, "T": 19.96, "P": 49.90},
        {"LOG": "AV. UBIRAJARAS", "NUM": 438, "T": 22.56, "P": 19.96}
    ];

    let curPos = L.latLng(-27.595, -48.545);
    let logAtual = "";
    let faceIdx = -1;

    dadosLotes.forEach((lote, index) => {
        if (lote.LOG !== logAtual) {
            let loteAnterior = dadosLotes[index - 1];
            logAtual = lote.LOG;
            faceIdx++;

            if (faceIdx === 1) { // Transição para Caramurus
                curPos = L.latLng(curPos.lat - (loteAnterior.P * mToDeg), curPos.lng);
            }
            // A transição para a Ubirajaras agora considera o 3650[cite: 1, 2]
            if (faceIdx === 3) {
                curPos = L.latLng(curPos.lat, curPos.lng); 
            }
        }

        let lat1, lon1, lat2, lon2;
        let t = lote.T * mToDeg;
        let p = lote.P * mToDeg;

        if (faceIdx === 0) { // NORTE
            lat1 = curPos.lat; lon1 = curPos.lng;
            lat2 = lat1 - p; lon2 = lon1 + t;
            curPos = L.latLng(lat1, lon2);
        } 
        else if (faceIdx === 1) { // LESTE
            lat1 = curPos.lat; lon1 = curPos.lng;
            lat2 = lat1 - t; lon2 = lon1 - p;
            curPos = L.latLng(lat2, lon1);
        }
        else if (lote.NUM === 3590) { // PIVÔ LESTE-SUL[cite: 1, 2]
            lat1 = curPos.lat; lon1 = curPos.lng;
            lat2 = lat1 - p; lon2 = lon1 - t;
            curPos = L.latLng(lat2, lon1 - t); 
        }
        else if (faceIdx === 2) { // SUL
            lat1 = curPos.lat; lon1 = curPos.lng;
            lat2 = lat1 + p; lon2 = lon1 - t;
            curPos = L.latLng(lat1, lon2);
        }
        else if (lote.NUM === 380) { // PIVÔ SUL-OESTE (Ubirajaras)[cite: 1]
            // O curPos aqui é a quina inferior esquerda do lote 3650
            lat1 = curPos.lat; 
            lon1 = curPos.lng;
            // Estende a linha da Santa Catarina para Oeste pela PROFUNDIDADE do 380
            lon2 = lon1 - p;
            // Sobe a Avenida Ubirajaras pela TESTADA do 380
            lat2 = lat1 + t;
            // Próximo lote começa na quina da calçada (topo do 380)
            curPos = L.latLng(lat2, lon1 - p);
        }
        else if (faceIdx === 3) { // RESTANTE OESTE
            lat1 = curPos.lat; lon1 = curPos.lng;
            lat2 = lat1 + t; 
            lon2 = lon1 + p; // Profundidade para dentro (Leste)
            curPos = L.latLng(lat2, lon1);
        }

        L.rectangle([[lat1, lon1], [lat2, lon2]], {
            color: "#333", weight: 1, 
            fillColor: (lote.NUM === 3590 || lote.NUM === 380) ? "#ffa726" : 
                       (faceIdx === 0 ? "#bbdefb" : faceIdx === 1 ? "#c8e6c9" : faceIdx === 2 ? "#fff9c4" : "#f8bbd0"),
            fillOpacity: 0.7
        }).addTo(map).bindTooltip(`${lote.NUM}`, {permanent: true, direction: 'center', className: 'label-lote'});
    });
</script>
</body>
</html>
