<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TCC Capanema v22.0 - Correção Total de Quadras</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; font-family: "Segoe UI", sans-serif; height: 100vh; }
        #sidebar { width: 380px; background: #f8f9fa; border-right: 2px solid #2c3e50; padding: 15px; display: flex; flex-direction: column; box-sizing: border-box; }
        #map { flex-grow: 1; height: 100vh; }
        #statusLog { font-family: monospace; font-size: 10px; background: #1e1e1e; color: #00ff00; padding: 10px; height: 200px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #000; }
        .btn { width: 100%; padding: 10px; background: #2c3e50; color: #fff; border: none; cursor: pointer; font-weight: bold; font-size: 11px; margin-top: 5px; border-radius: 4px; }
        .btn-save { background: #27ae60; margin-top: auto; }
        .face-label { background: #e67e22; color: #fff; border-radius: 50%; width: 22px; height: 22px; text-align: center; font-size: 10px; line-height: 22px; border: 2px solid #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="font-size: 14px; margin-top: 0;">1. Entrada de Dados</h2>
    <label style="font-size: 10px;">Arquivo de Quadras (.csv):</label>
    <input type="file" id="csvQuadras" accept=".csv" style="width:100%; font-size:10px; margin-bottom: 10px;">
    <label style="font-size: 10px;">Arquivo de Logradouros (.csv):</label>
    <input type="file" id="csvLogradouros" accept=".csv" style="width:100%; font-size:10px; margin-bottom: 10px;">
    <button class="btn" onclick="inicializar()">CARREGAR E PROCESSAR</button>

    <h2>2. Log de Depuração</h2>
    <div id="statusLog">Aguardando arquivos...</div>

    <h2>3. Exportação</h2>
    <button class="btn btn-save" onclick="exportarCSV()">SALVAR CAPANEMA_FINAL.csv</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([-25.666, -53.806], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { opacity: 0.7 }).addTo(map);
    
    const camadaQuadras = L.featureGroup().addTo(map);
    const camadaMarkers = L.featureGroup().addTo(map);

    let dbLogradouros = [];
    let resultadosExportacao = []; 
    let dictPoligonos = {};

    function addLog(msg, color = "#0f0") {
        const log = document.getElementById('statusLog');
        log.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function parseWKT(wkt) {
        if (!wkt) return null;
        try {
            // Pega o conteúdo entre o primeiro (( e o último ))
            const match = wkt.match(/\(\((.*?)\)\)/);
            const content = match ? match[1] : wkt.replace(/[A-Z\(\)]/gi, "").trim();
            
            return content.split(",").map(p => {
                const parts = p.trim().split(/\s+/);
                return [parseFloat(parts[1]), parseFloat(parts[0])]; // [lat, lng]
            }).filter(c => !isNaN(c[0]) && !isNaN(c[1]));
        } catch (e) {
            return null;
        }
    }

    async function inicializar() {
        const fQ = document.getElementById('csvQuadras').files[0];
        const fL = document.getElementById('csvLogradouros').files[0];
        if(!fQ || !fL) return alert("Selecione os dois arquivos.");

        addLog("Iniciando leitura dos arquivos...");

        // 1. Processar Logradouros (CSV simples)
        const txtL = await fL.text();
        dbLogradouros = txtL.split('\n').slice(1).map(l => {
            const c = l.split(',');
            return c.length >= 2 ? { nom: c[0].replace(/"/g,'').trim(), id: c[1].trim() } : null;
        }).filter(x => x);
        addLog(`Logradouros carregados: ${dbLogradouros.length}`);

        // 2. Processar Quadras (CSV com WKT complexo)
        const txtQ = await fQ.text();
        const linhas = txtQ.split(/\r?\n/);
        addLog(`Linhas totais no CSV: ${linhas.length}`);
        
        camadaQuadras.clearLayers();
        let contador = 0;

        // Regex para separar por vírgula, mas ignorar vírgulas dentro de aspas
        const csvRegex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;

        linhas.slice(1).forEach((linha, idx) => {
            if (!linha.trim()) return;

            const colunas = linha.split(csvRegex);
            
            // Verificando se as colunas batem com o formato: id, ibge, codigo, geometria
            if (colunas.length >= 4) {
                const codigo = colunas[2].replace(/"/g, '').trim();
                const wkt = colunas[3].replace(/"/g, '').trim();
                const coords = parseWKT(wkt);

                if (coords && coords.length > 2) {
                    const poly = L.polygon(coords, { 
                        color: '#2c3e50', 
                        weight: 2, 
                        fillOpacity: 0.2,
                        codigo_cart: codigo 
                    }).addTo(camadaQuadras);
                    
                    dictPoligonos[codigo] = poly;
                    poly.on('click', () => abrirQuadra(codigo, coords));
                    contador++;
                }
            }
        });

        addLog(`Sucesso: ${contador} quadras carregadas no mapa.`, "#3498db");
        if (contador > 0) map.fitBounds(camadaQuadras.getBounds());
    }

    function calcularGeometriaFace(p1, p2) {
        const R = 6371000;
        const dLat = (p2[0] - p1[0]) * Math.PI / 180;
        const dLon = (p2[1] - p1[1]) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(p1[0]*Math.PI/180)*Math.cos(p2[0]*Math.PI/180)*Math.sin(dLon/2)**2;
        const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        
        const y = Math.sin(dLon) * Math.cos(p2[0]*Math.PI/180);
        const x = Math.cos(p1[0]*Math.PI/180)*Math.sin(p2[0]*Math.PI/180)-Math.sin(p1[0]*Math.PI/180)*Math.cos(p2[0]*Math.PI/180)*Math.cos(dLon);
        const az = (Math.atan2(y, x)*180/Math.PI + 360) % 360;

        return { dist, az };
    }

    function abrirQuadra(codigo, coords) {
        addLog(`Inspecionando faces da quadra: ${codigo}`, "#f39c12");
        camadaMarkers.clearLayers();
        
        // Percorre os vértices para criar as faces
        for (let i = 0; i < coords.length - 1; i++) {
            const p1 = coords[i];
            const p2 = coords[i+1];
            const geo = calcularGeometriaFace(p1, p2);
            const centro = [(p1[0]+p2[0])/2, (p1[1]+p2[1])/2];

            const options = dbLogradouros.map(l => `<option value="${l.id}">${l.nom}</option>`).join('');

            L.marker(centro, { 
                icon: L.divIcon({ className: 'face-label', html: i+1 }) 
            }).addTo(camadaMarkers)
              .bindPopup(`
                <div style="min-width:200px">
                    <b>Face ${i+1}</b><br>
                    Dimensão: ${geo.dist.toFixed(2)}m<br>
                    Azimute: ${geo.az.toFixed(1)}°<br>
                    <hr>
                    <select style="width:100%" onchange="vincular('${codigo}', ${i+1}, this.value, this.options[this.selectedIndex].text, ${geo.az}, ${geo.dist}, ${centro[0]}, ${centro[1]})">
                        <option>Selecionar Logradouro...</option>${options}
                    </select>
                </div>
            `);
        }
    }

    function vincular(cod, face, idL, nomL, az, dist, lat, lng) {
        resultadosExportacao = resultadosExportacao.filter(r => !(r.cod === cod && r.face === face));
        resultadosExportacao.push({ cod, face, idL, nomL, az, dist, lat, lng });
        
        if(dictPoligonos[cod]) {
            dictPoligonos[cod].setStyle({ color: '#27ae60', fillOpacity: 0.4, weight: 3 });
        }
        addLog(`Vínculo: Quadra ${cod} - Face ${face} OK`, "#2ecc71");
    }

    function exportarCSV() {
        if(resultadosExportacao.length === 0) return alert("Nenhum dado vinculado ainda.");
        const ts = new Date().toISOString().replace(/[-:T]/g, '').split('.')[0];
        let csv = "CODIGO_CARTOGRAFICO,FACE,DIMENSAO,AZIMUTE,LAT,LNG,SC_ID_LOGRADOURO,NOM_LOGRADOURO\n";
        resultadosExportacao.forEach(r => {
            csv += `${r.cod},${r.face},${r.dist.toFixed(2)},${r.az.toFixed(2)},${r.lat},${r.lng},${r.idL},"${r.nomL}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `TCC_,FACES_GEO${ts}.csv`;
        link.click();
    }
</script>
</body>
</html>
