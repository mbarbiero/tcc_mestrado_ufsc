<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exportação SC_orientado Ajustado</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; font-family: 'Segoe UI', sans-serif; }
        #frame-container { width: 800px; height: 600px; position: absolute; top: 0; left: 0; background: white; border-right: 1px solid #ccc; border-bottom: 1px solid #ccc; overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        .info-panel { 
            position: absolute; top: 20px; left: 20px; z-index: 1001; 
            background: rgba(255, 255, 255, 0.96); padding: 15px; border-radius: 2px; 
            width: 260px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #999;
        }

        h2 { margin: 0 0 10px 0; font-size: 15px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .label-title { font-size: 9px; color: #666; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 3px; }
        
        /* Deltas Originais */
        .delta-container { margin: 10px 0; display: flex; flex-direction: column; gap: 4px; }
        .delta-item { 
            background: #000; color: #fff; padding: 8px; 
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 2px; font-weight: bold; font-size: 11px;
        }
        .delta-label { font-size: 8px; text-transform: uppercase; color: #fff; opacity: 0.7; font-weight: normal; }

        /* Botão Exportar */
        .btn-export {
            width: 100%; padding: 10px; background: #2e7d32; color: white;
            border: none; border-radius: 2px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; font-size: 11px; transition: background 0.2s;
        }
        .btn-export:hover { background: #1b5e20; }
        
        #wkt-output { 
            margin-top: 10px; font-family: 'Consolas', monospace; font-size: 9px; 
            background: #eee; padding: 5px; border: 1px solid #ccc; 
            word-break: break-all; display: none;
        }
    </style>
</head>
<body>
    <div id="frame-container">
        <div class="info-panel">
            <h2>Ajuste SC_orientado</h2>
            
            <span class="label-title">Deltas Originais (Pré-Ajuste)</span>
            <div class="delta-container">
                <div class="delta-item">
                    <span class="delta-label">Δ Latitude</span>
                    <span id="d-lat">0.00 cm</span>
                </div>
                <div class="delta-item">
                    <span class="delta-label">Δ Longitude</span>
                    <span id="d-lng">0.00 cm</span>
                </div>
                <div class="delta-item">
                    <span class="delta-label">Δ Total</span>
                    <span id="d-total">0.00 cm</span>
                </div>
            </div>

            <button class="btn-export" onclick="exportWKT()">Exportar Vertices WKT</button>
            <div id="wkt-output"></div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 22 });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);

        // 1. DADOS SC ORIENTADO ORIGINAL
        const polyOriCoords = [
            [-25.68108983, -53.80246383], [-25.68132936, -53.80150399],
            [-25.68037262, -53.80121323], [-25.68013309, -53.80217306]
        ];

        // 2. REFERÊNCIA OSM (PARA CÁLCULO DO CENTROIDE ALVO)
        const osmGeoms = [
            { id: "90", wkt: "-53.8108103 -25.6778927,-53.8023996 -25.6800076,-53.8022714 -25.6800403,-53.801106 -25.6803347" },
            { id: "15", wkt: "-53.8034091 -25.6839624,-53.8025915 -25.6811351,-53.8022714 -25.6800403" },
            { id: "F0", wkt: "-53.8024655 -25.6847714,-53.8014431 -25.6814349,-53.801106 -25.6803347" },
            { id: "F5", wkt: "-53.8055092 -25.6803838,-53.8025915 -25.6811351,-53.8014431 -25.6814349" }
        ];

        // Centroide SC Orientado Original
        let sumOri = { lat: 0, lng: 0 };
        polyOriCoords.forEach(p => { sumOri.lat += p[0]; sumOri.lng += p[1]; });
        const cOriOrig = L.latLng(sumOri.lat/4, sumOri.lng/4);

        // Centroide OSM Dinâmico
        let osmQuadraPoints = [];
        osmGeoms.forEach(geom => {
            const pts = geom.wkt.split(',').map(s => {
                const c = s.trim().split(' ');
                return [parseFloat(c[1]), parseFloat(c[0])];
            });
            let sorted = pts.sort((a,b) => cOriOrig.distanceTo(L.latLng(a[0], a[1])) - cOriOrig.distanceTo(L.latLng(b[0], b[1])));
            osmQuadraPoints.push(sorted[0], sorted[1]);
        });
        let sumOSM = { lat: 0, lng: 0 };
        osmQuadraPoints.forEach(p => { sumOSM.lat += p[0]; sumOSM.lng += p[1]; });
        const cOSM = L.latLng(sumOSM.lat/8, sumOSM.lng/8);

        // 3. CALCULAR E MOSTRAR DELTAS ORIGINAIS
        const cmLat = Math.abs((cOriOrig.lat - cOSM.lat) * 111320 * 100).toFixed(2);
        const cmLng = Math.abs((cOriOrig.lng - cOSM.lng) * 100450 * 100).toFixed(2);
        const distTotal = (cOriOrig.distanceTo(cOSM) * 100).toFixed(2);

        document.getElementById('d-lat').innerText = `${cmLat} cm`;
        document.getElementById('d-lng').innerText = `${cmLng} cm`;
        document.getElementById('d-total').innerText = `${distTotal} cm`;

        // 4. APLICAR TRANSLAÇÃO E DESENHAR
        const dLat = cOSM.lat - cOriOrig.lat;
        const dLng = cOSM.lng - cOriOrig.lng;
        const polyAjustado = polyOriCoords.map(p => [p[0] + dLat, p[1] + dLng]);

        L.polygon(polyAjustado, { color: '#2e7d32', weight: 3, fillOpacity: 0.2 }).addTo(map);
        L.circleMarker(cOSM, { radius: 8, color: "#fff", weight: 2, fillColor: "#2e7d32", fillOpacity: 1 }).addTo(map);

        // 5. EXPORTAÇÃO WKT
        function exportWKT() {
            // Repetir o primeiro ponto no final para fechar o polígono WKT
            const points = [...polyAjustado, polyAjustado[0]];
            const wktString = "POLYGON((" + points.map(p => `${p[1].toFixed(8)} ${p[0].toFixed(8)}`).join(',') + "))";
            
            const output = document.getElementById('wkt-output');
            output.innerText = wktString;
            output.style.display = 'block';
            
            // Copiar para o clipboard automaticamente
            navigator.clipboard.writeText(wktString);
            alert("WKT copiado para a área de transferência!");
        }

        map.setView(cOSM, 19);
        map.panBy([-130, 0]);
    </script>
</body>
</html>
