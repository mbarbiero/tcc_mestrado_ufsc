<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Localizador de Ponto - SuperCIATA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .info-box {
            position: absolute;
            top: 10px;
            left: 50px;
            background: white;
            padding: 10px;
            z-index: 1000;
            border: 2px solid #000;
            font-family: sans-serif;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="info-box">
    <b>Coordenadas:</b><br>
    Lat: -25.667198917618627<br>
    Lng: -53.79850712463502
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Coordenadas fornecidas
    const lat = -25.667198917618627;
    const lng = -53.79850712463502;

    // Inicializa o mapa centralizado no ponto
    const map = L.map('map').setView([lat, lng], 18);

    // Adiciona a camada do OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 20,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Adiciona um marcador no local
    const marker = L.marker([lat, lng]).addTo(map)
        .bindPopup("<b>Ponto Alvo</b><br>Capanema - PR")
        .openPopup();

    // Adiciona um círculo para destacar a precisão
    L.circle([lat, lng], {
        color: 'red',
        fillColor: '#f03',
        fillOpacity: 0.2,
        radius: 20
    }).addTo(map);
</script>

</body>
</html>
