<!DOCTYPE html>
<html>
<head>
    <title>Mapa de Erro - 2 Vizinhos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 700px; width: 100%; }
        .info { padding: 10px; background: white; border: 1px solid gray; }
    </style>
</head>
<body>
    <input type="file" id="csvFile" accept=".csv" />
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-25.666, -53.806], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                const lines = reader.result.split('\n').slice(1);
                lines.forEach(line => {
                    const c = line.split(',');
                    if (c.length < 10) return;

                    const geo = [parseFloat(c[2]), parseFloat(c[3])];
                    const v1 = [parseFloat(c[4]), parseFloat(c[5])];
                    const v2 = [parseFloat(c[7]), parseFloat(c[8])];

                    // Original (Verde)
                    L.circleMarker(geo, {color: 'green', radius: 5}).addTo(map);
                    
                    // Vizinhos (Vermelho)
                    L.circleMarker(v1, {color: 'red', radius: 3}).addTo(map);
                    L.circleMarker(v2, {color: 'red', radius: 3}).addTo(map);

                    // Linhas de Erro (Spider)
                    L.polyline([geo, v1], {color: 'red', weight: 1, opacity: 0.5}).addTo(map);
                    L.polyline([geo, v2], {color: 'orange', weight: 1, opacity: 0.5}).addTo(map);
                });
            };
            reader.readAsText(e.target.files[0]);
        });
    </script>
</body>
</html>
