<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SuperCIATA v25.0 - Geometria Otimizada</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; font-family: "Segoe UI", sans-serif; }
        #sidebar { width: 380px; height: 100vh; background: #f8f9fa; border-right: 2px solid #000; padding: 15px; z-index: 1000; display: flex; flex-direction: column; box-sizing: border-box; }
        #map { flex-grow: 1; height: 100vh; }
        h2 { font-size: 12px; text-transform: uppercase; margin: 10px 0 5px 0; border-bottom: 2px solid #000; padding-bottom: 3px; }
        #statusLog { font-family: monospace; font-size: 11px; background: #000; color: #0f0; padding: 10px; height: 120px; overflow-y: auto; margin-bottom: 10px; }
        .btn { width: 100%; padding: 10px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; font-size: 10px; margin-top: 5px; }
        .btn-save { background: #27ae60; margin-top: auto; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>1. Entrada de Dados</h2>
    <input type="file" id="csvFile" accept=".csv" style="font-size:10px; width:100%">
    <button class="btn" onclick="location.reload()">LIMPAR MAPA</button>

    <h2>2. Status de Filtragem</h2>
    <div id="statusLog">Aguardando arquivo...</div>

    <h2>3. Exportação</h2>
    <button class="btn btn-save" onclick="copiarWKT()">COPIAR WKT (CLIPBOARD)</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { maxZoom: 22 }).setView([-25.666, -53.806], 18);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 }).addTo(map);
    
    const camadaPrincipal = L.featureGroup().addTo(map);
    const camadaDebug = L.featureGroup().addTo(map);

    const METERS_PER_LAT_DEG = 111320;
    const DEG_TO_RAD = Math.PI / 180;
    let wktResults = "";

    function addLog(msg) {
        const log = document.getElementById('statusLog');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    // Função de distância euclidiana simples para filtros de proximidade
    function getDist(p1, p2) {
        const dx = (p1.lng - p2.lng) * Math.cos(p1.lat * DEG_TO_RAD) * METERS_PER_LAT_DEG;
        const dy = (p1.lat - p2.lat) * METERS_PER_LAT_DEG;
        return Math.sqrt(dx*dx + dy*dy);
    }

    function parseWKT(wkt) {
        if (!wkt) return null;
        let clean = wkt.replace(/"/g, '').replace('POINT(', '').replace(')', '').trim();
        let pts = clean.split(/\s+/); 
        return { lng: parseFloat(pts[0]), lat: parseFloat(pts[1]) };
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        if(!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (event) => processarCsv(event.target.result);
        reader.readAsText(e.target.files[0]);
    });

    function processarCsv(csvText) {
        const lines = csvText.trim().split('\n');
        const delimiter = lines[0].includes(';') ? ';' : ',';
        
        const rawData = lines.slice(1).map(row => {
            const c = row.split(delimiter);
            return {
                codigo: c[0],
                v1: parseWKT(c[2]),
                v2: parseWKT(c[3]),
                centroide: parseWKT(c[5]),
                ordem: parseInt(c[6]),
                dim: parseFloat(c[7])
            };
        }).filter(f => f && f.codigo && f.centroide);

        const quadrasMap = {};
        rawData.forEach(f => {
            if (!quadrasMap[f.codigo]) quadrasMap[f.codigo] = [];
            quadrasMap[f.codigo].push(f);
        });

        camadaPrincipal.clearLayers();
        wktResults = "CODIGO;WKT_TRANSLADADO\n";

        Object.keys(quadrasMap).forEach(key => {
            const faces = quadrasMap[key];
            const anc = faces.reduce((prev, curr) => (prev.centroide.lat > curr.centroide.lat) ? prev : curr);
            
            // Cálculos de translação e rotação baseados no original
            const cosLat = Math.cos(anc.centroide.lat * DEG_TO_RAD);
            const latConv = 1 / METERS_PER_LAT_DEG;
            const lngConv = 1 / (METERS_PER_LAT_DEG * cosLat);

            let dx = (anc.v2.lng - anc.v1.lng) * cosLat;
            let dy = (anc.v2.lat - anc.v1.lat);
            let anguloRad = Math.atan2(dy, dx);
            if (dx < 0) anguloRad += Math.PI;

            const dimN = anc.dim;
            const dimL = (faces.find(f => f.ordem === (anc.ordem % 4 + 1)) || {dim: dimN}).dim;
            const dimS = (faces.find(f => f.ordem === ((anc.ordem + 1) % 4 + 1)) || {dim: dimN}).dim;
            const dimO = (faces.find(f => f.ordem === ((anc.ordem + 2) % 4 + 1)) || {dim: dimN}).dim;

            const ptsMetros = [{x: -dimN/2, y: 0}, {x: dimN/2, y: 0}, {x: dimN/2, y: -dimL}, {x: -dimN/2, y: -dimO}];

            const vGirada = ptsMetros.map(p => {
                const rx = p.x * Math.cos(anguloRad) - p.y * Math.sin(anguloRad);
                const ry = p.x * Math.sin(anguloRad) + p.y * Math.cos(anguloRad);
                return [anc.centroide.lat + (ry * latConv), anc.centroide.lng + (rx * lngConv)];
            });

            const pointsOSM = faces.flatMap(f => [[f.v1.lat, f.v1.lng], [f.v2.lat, f.v2.lng]]);
            const cOSM = [0,0]; 
            pointsOSM.forEach(p=>{cOSM[0]+=p[0]; cOSM[1]+=p[1]});
            cOSM[0]/=pointsOSM.length; cOSM[1]/=pointsOSM.length;

            const cGir = [0,0]; 
            vGirada.forEach(v=>{cGir[0]+=v[0]; cGir[1]+=v[1]}); 
            cGir[0]/=4; cGir[1]/=4;

            const vTrans = vGirada.map(v => [v[0] + (cOSM[0] - cGir[0]), v[1] + (cOSM[1] - cGir[1])]);
            
            const poly = L.polygon(vTrans, { color: '#2980b9', weight: 2.5, fillOpacity: 0.15 }).addTo(camadaPrincipal);

            // Clique: Lógica de Filtragem e Exibição de Debug
            poly.on('click', () => {
                camadaDebug.clearLayers();
                addLog(`Analisando Quadra ${key}`);
                
                faces.forEach(f => {
                    const limite = f.dim / 4;
                    
                    // 1. Mostrar Centroide da Face (Verde)
                    L.circleMarker([f.centroide.lat, f.centroide.lng], { 
                        radius: 5, color: '#27ae60', fillColor: '#27ae60', fillOpacity: 1, stroke: false 
                    }).addTo(camadaDebug);

                    // 2. Processar Vértices OSM (Vermelhos) com filtros
                    [f.v1, f.v2].forEach((v, idx) => {
                        const distAoCentroide = getDist(v, f.centroide);
                        const distEntreVertices = getDist(f.v1, f.v2);
                        
                        let descartar = false;
                        
                        // Eliminar se muito perto do centroide
                        if(distAoCentroide < limite) descartar = true;
                        
                        // Eliminar se v1 e v2 estão muito próximos (menos de 1/4 da face) e não são coincidentes
                        if(distEntreVertices > 0 && distEntreVertices < limite) descartar = true;

                        if(!descartar) {
                            L.circleMarker([v.lat, v.lng], { 
                                radius: 4, color: 'red', fillColor: 'red', fillOpacity: 0.8, stroke: false 
                            }).addTo(camadaDebug);
                        } else {
                            console.log(`Ponto face ${f.ordem} filtrado por proximidade.`);
                        }
                    });
                });

                // Centroide Alvo (Amarelo)
                L.circleMarker([cOSM[0], cOSM[1]], { radius: 6, color: '#f1c40f', fillOpacity: 0.6 }).addTo(camadaDebug);
            });

            const coordsWkt = vTrans.map(v => `${v[1]} ${v[0]}`).join(', ');
            wktResults += `${key};POLYGON((${coordsWkt}, ${vTrans[0][1]} ${vTrans[0][0]}))\n`;
        });
        
        map.fitBounds(camadaPrincipal.getBounds());
        addLog(`Sucesso: ${Object.keys(quadrasMap).length} quadras.`);
    }

    function copiarWKT() {
        if(!wktResults) return alert("Sem dados.");
        navigator.clipboard.writeText(wktResults);
        alert("WKT copiado!");
    }
</script>
</body>
</html>
